name: Autofix

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autofix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: 1
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  graphql-codegen:
    name: GraphQL Codegen
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run GraphQL Codegen
        run: npm run generate

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: apply graphql codegen"
          title: "chore(autofix): GraphQL Codegen"
          body: |
            Automatischer Lauf von `npm run generate` (GraphQL Codegen).

            **Ereignis:** `${{ github.event_name }}`

            Workflow: `.github/workflows/autofix.yml`
          branch: autofix/codegen-${{ github.run_id }}
          delete-branch: true
