name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
  pull_request:
    branches:
      - main
    paths:
      - "apps/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "25"
  NEXT_TELEMETRY_DISABLED: 1
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache node modules
        id: cache-node-modules
        uses: ./.github/actions/cache-node-modules
        with:
          cache-key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/package.json', '**/turbo.json', '**/tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Type-check (Turbo)
        run: npm run type-check

      - name: Setup environment files
        uses: ./.github/actions/setup-env

      - name: Build (Turbo)
        run: npm run build

      - name: Upload UI build
        uses: actions/upload-artifact@v7
        with:
          name: ui-dist
          path: apps/ui/out
          retention-days: 1

      - name: Upload API build
        uses: actions/upload-artifact@v7
        with:
          name: api-dist
          path: apps/api/dist
          retention-days: 1

  docker-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-verify
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: mardinlimunir
      DOCKER_IMAGE_NAME: mardinlimunir/${{ github.event.repository.name }}
      DOCKER_REGISTRY: docker.io
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Download UI artifact
        uses: actions/download-artifact@v8
        with:
          name: ui-dist
          path: apps/ui/out

      - name: Download API artifact
        uses: actions/download-artifact@v8
        with:
          name: api-dist
          path: apps/api/dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Testcontainers Cloud Client
        uses: atomicjar/testcontainers-cloud-setup-action@v1
        with:
          token: ${{ secrets.TC_CLOUD_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install API production dependencies
        working-directory: apps/api
        run: npm install --omit=dev

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .github/.docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          no-cache: true
          tags: |
            mardinlimunir/dashboard:latest
            mardinlimunir/dashboard:arm64
          labels: ${{ steps.meta.outputs.labels }}
